# Materialized effective config for the SO-100 warm-start arm. It matches
# so100.toml except for training.warmstart_from until layered config includes
# are implemented.
schema_version = "1.0.0"

[dataset]
kind = "so100"
hdf5_path = "/data/so100/svla_so100_pickplace.h5"
camera_view = "top"
stats_path = "/data/so100/stats.safetensors"

[model]
history_size = 3
horizon = 4

[model.encoder]
size = "tiny"
image_size = 224
patch_size = 14
num_channels = 3
hidden_size = 192
num_hidden_layers = 12
num_attention_heads = 3
intermediate_size = 768
hidden_act = "gelu_tanh"
attention_probs_dropout_prob = 0.0
hidden_dropout_prob = 0.0
layer_norm_eps = 1.0e-12
use_cls_token = true
interpolate_pos_encoding = false
use_mask_token = false
pretrained = false

[model.action_encoder]
input_dim = 6
smoothed_dim = 10
emb_dim = 192
mlp_scale = 4

[model.predictor]
num_frames = 3
depth = 6
heads = 16
mlp_dim = 2048
dim_head = 64
input_dim = 192
hidden_dim = 192
output_dim = 192
action_emb_dim = 192
dropout = 0.1
emb_dropout = 0.0

[model.projector]
input_dim = 192
hidden_dim = 2048
output_dim = 192
norm = "batch_norm_1d"

[model.pred_proj]
input_dim = 192
hidden_dim = 2048
output_dim = 192
norm = "batch_norm_1d"

[loss]
lambda_sigreg = 1.0
sigreg_knots = 17
sigreg_num_proj = 1024
sigreg_t_max = 3.0

[training]
history_size = 3
horizon = 4
batch_size = 64
grad_accum_steps = 2
optimizer = "adamw"
lr_peak = 3.0e-4
lr_min = 1.0e-5
warmup_steps = 500
weight_decay = 0.05
betas = [0.9, 0.95]
epochs = 10
precision = "bf16_mixed"
seed = 0
grad_clip_norm = 1.0
eval_every_n_epochs = 5
probe_every_n_steps = 100
warmstart_from = "/checkpoints/lewm-rs-pusht/step_0014400.mpk"

[eval]
kind = "so100_latent_rollout"
episode_ids = [5, 14, 23, 31, 42]
