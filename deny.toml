[graph]
all-features = true

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
# cargo-deny 0.18 uses a scope selector for unmaintained advisories, not a
# lint level. This preserves the RFC intent that transitive unmaintained notices
# do not block ordinary PRs while direct workspace dependencies still do.
unmaintained = "workspace"
yanked = "deny"
ignore = [
    # Tract 0.22.1 pulls Liquid/time; keep scoped until tract can upgrade.
    "RUSTSEC-2026-0009",
]

[licenses]
confidence-threshold = 0.93
unused-allowed-license = "allow"
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unlicense",
    "CC0-1.0",
    "MPL-2.0",
    "Unicode-3.0",
    # Mozilla root certificate data bundled by webpki-roots via rustls.
    "CDLA-Permissive-2.0",
    # Bundled by hdf5-metno when the static feature is enabled; BSD-style terms.
    "HDF5",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
deny = [
    { crate = "openssl-sys" },
]
