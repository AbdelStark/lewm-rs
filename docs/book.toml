# mdBook configuration for the lewm-rs documentation site.
# See https://rust-lang.github.io/mdBook/format/configuration/index.html

[book]
title = "lewm-rs — A Rust Reproduction of LeWorldModel"
description = """
Comprehensive technical documentation for lewm-rs, a pure-Rust reproduction
of the LeWorldModel (Maes et al., 2026) JEPA world model: architecture,
training paradigm, SIGReg, AdaLN-zero predictor, CEM planning, ONNX/Tract
inference, and reproducibility contracts.
"""
authors = ["Abdel"]
language = "en"
multilingual = false
src = "src"

[rust]
edition = "2024"

[output.html]
default-theme = "navy"
preferred-dark-theme = "navy"
git-repository-url = "https://github.com/AbdelStark/lewm-rs"
git-repository-icon = "fa-github"
edit-url-template = "https://github.com/AbdelStark/lewm-rs/edit/main/docs/{path}"
site-url = "/lewm-rs/"
mathjax-support = true
copy-fonts = true
additional-css = ["theme/custom.css"]
additional-js = ["theme/footnote.js"]
no-section-label = false
smart-punctuation = true

[output.html.fold]
enable = true
level = 1

[output.html.search]
enable = true
limit-results = 30
teaser-word-count = 30
use-boolean-and = true
boost-title = 2
boost-hierarchy = 1
boost-paragraph = 1
expand = true
heading-split-level = 3

[output.html.playground]
editable = false
copyable = true
copy-js = true
line-numbers = true

[output.html.code]
hidelines = { rust = "~" }

[preprocessor.index]

[preprocessor.links]
