hardware: a10g-large
timeout: 12h
namespace: abdelstark
image: ghcr.io/abdelstark/lewm-rs:latest
env:
  RUST_LOG: lewm=info,burn=info
  HF_TOKEN: ${HF_TOKEN}
  HF_HOME: /tmp/hf
  TRACKIO_PROJECT: lewm-rs
  TRACKIO_RUN: pusht-full-burn-jepa
  OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_ENDPOINT:-}
command: |
  bash -lc "
    set -euo pipefail
    hf download quentinll/lewm-pusht pusht_expert_train.h5.zst --repo-type dataset --local-dir /tmp/data &&
    zstd -f -d /tmp/data/pusht_expert_train.h5.zst -o /tmp/data/pusht_expert_train.h5 &&
    export HDF5_PLUGIN_PATH=$(python -c 'import hdf5plugin; print(hdf5plugin.PLUGIN_PATH)') &&
    lewm-train train \
      --config configs/pusht.toml \
      --set 'experimental.pusht_train_mode=\"full_burn_jepa\"' \
      --device cpu \
      --data-dir /tmp/data \
      --output-dir /tmp/out \
      --resume-if-present \
      --max-steps ${LEWM_MAX_STEPS:-50000} &&
    python python/upload_checkpoints.py \
      --src /tmp/out \
      --dst abdelstark/lewm-rs-pusht \
      --path-prefix train/pusht-full-burn-jepa-$(date -u +%Y%m%dT%H%M%SZ)
  "
