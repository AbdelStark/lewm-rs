name: release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write
  id-token: write

env:
  RUST_TOOLCHAIN: "1.85.0"
  REPRO_PROFILE: release-lto
  REPRO_TARGET: x86_64-unknown-linux-musl

jobs:
  tag-format:
    name: tag-format
    runs-on: ubuntu-22.04
    steps:
      - name: Validate release tag
        run: |
          if [[ ! "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            printf 'invalid release tag: %s\n' "$GITHUB_REF_NAME" >&2
            exit 1
          fi

  build-linux-static:
    name: build-linux-static
    runs-on: ubuntu-22.04
    needs: [tag-format]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        run: rustup toolchain install "$RUST_TOOLCHAIN" --profile default --target x86_64-unknown-linux-musl

      - name: Build release binaries
        run: REPRO_TARGET_DIR=target REPRO_OUTPUT_DIR=dist/linux-static-binaries scripts/build_reproducible_release.sh

      - name: Upload Linux binaries
        uses: actions/upload-artifact@v4
        with:
          name: linux-static-binaries
          path: dist/linux-static-binaries/lewm-*

  build-macos-arm:
    name: build-macos-arm
    runs-on: macos-14
    needs: [tag-format]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        run: rustup toolchain install "$RUST_TOOLCHAIN" --profile default --target aarch64-apple-darwin

      - name: Build release binaries
        run: REPRO_TARGET=aarch64-apple-darwin REPRO_TARGET_DIR=target REPRO_OUTPUT_DIR=dist/macos-arm-binaries scripts/build_reproducible_release.sh

      - name: Upload macOS binaries
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm-binaries
          path: dist/macos-arm-binaries/lewm-*

  container:
    name: container
    runs-on: ubuntu-22.04
    needs: [tag-format]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build container when Dockerfile exists
        run: |
          if [ -f Dockerfile ]; then
            docker build -t ghcr.io/abdelstark/lewm-rs:${GITHUB_REF_NAME} .
          else
            printf '%s\n' 'container build skipped: Dockerfile not present'
          fi

  release-notes:
    name: release-notes
    runs-on: ubuntu-22.04
    needs: [tag-format]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare release notes
        run: |
          mkdir -p dist
          awk '/^## \\[/ { seen++ } seen <= 2 { print }' CHANGELOG.md > dist/release-notes.md

      - name: Upload release notes
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: dist/release-notes.md

  verify-reproducible:
    name: verify-reproducible
    runs-on: ubuntu-22.04
    needs: [tag-format, build-linux-static]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download published Linux binaries
        uses: actions/download-artifact@v4
        with:
          name: linux-static-binaries
          path: dist/published

      - name: Rebuild and compare Linux binaries in a clean container
        run: |
          docker run --rm \
            -e RUST_TOOLCHAIN="${RUST_TOOLCHAIN}" \
            -e REPRO_PROFILE="${REPRO_PROFILE}" \
            -e REPRO_TARGET="${REPRO_TARGET}" \
            -e SOURCE_DATE_EPOCH="$(git log -1 --format=%ct)" \
            -v "${GITHUB_WORKSPACE}:/workspace" \
            -w /workspace \
            ubuntu:22.04 bash -lc '
              set -euo pipefail
              apt-get update
              apt-get install -y --no-install-recommends \
                ca-certificates curl build-essential pkg-config musl-tools binutils
              rm -rf /var/lib/apt/lists/*
              curl --proto "=https" --tlsv1.2 -sSf https://sh.rustup.rs \
                | sh -s -- -y --default-toolchain "${RUST_TOOLCHAIN}" \
                  --profile minimal --target "${REPRO_TARGET}"
              . "${HOME}/.cargo/env"
              scripts/verify_reproducible_release.sh dist/published
            '

  github-release:
    name: github-release
    runs-on: ubuntu-22.04
    needs: [build-linux-static, build-macos-arm, container, release-notes, verify-reproducible]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create draft release
        run: |
          gh release create "$GITHUB_REF_NAME" \
            dist/linux-static-binaries/* \
            dist/macos-arm-binaries/* \
            --draft \
            --notes-file dist/release-notes/release-notes.md \
            --title "$GITHUB_REF_NAME"
        env:
          GH_TOKEN: ${{ github.token }}

  hub-models:
    name: hub-models
    runs-on: ubuntu-22.04
    needs: [github-release]
    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
    steps:
      - name: Retag Hub artifacts when credentials exist
        run: |
          if [ -n "${HF_TOKEN:-}" ]; then
            printf '%s\n' 'Hub retagging is owned by the Hub publication milestone.'
          else
            printf '%s\n' 'Hub retagging skipped: HF_TOKEN not configured'
          fi
