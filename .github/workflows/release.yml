name: release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

concurrency:
  # Tag pushes are unique by definition; one in-flight per tag is enough.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  RUST_TOOLCHAIN: "1.95.0"
  REPRO_PROFILE: release-lto
  REPRO_TARGET: x86_64-unknown-linux-musl
  CARGO_NET_RETRY: "3"
  RUSTUP_MAX_RETRIES: "3"

jobs:
  tag-format:
    name: tag-format
    runs-on: ubuntu-22.04
    steps:
      - name: Validate release tag
        run: |
          if [[ ! "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            printf 'invalid release tag: %s\n' "$GITHUB_REF_NAME" >&2
            exit 1
          fi

  build-linux-static:
    name: build-linux-static
    runs-on: ubuntu-22.04
    needs: [tag-format]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build release binaries in reproducible container
        run: |
          docker run --rm \
            -e RUST_TOOLCHAIN="${RUST_TOOLCHAIN}" \
            -e REPRO_PROFILE="${REPRO_PROFILE}" \
            -e REPRO_TARGET="${REPRO_TARGET}" \
            -e SOURCE_DATE_EPOCH="$(git log -1 --format=%ct)" \
            -e HOST_UID="$(id -u)" \
            -e HOST_GID="$(id -g)" \
            -v "${GITHUB_WORKSPACE}:/workspace" \
            -w /workspace \
            ubuntu:22.04 bash -lc '
              set -euo pipefail
              git config --global --add safe.directory /workspace
              apt-get update
              apt-get install -y --no-install-recommends \
                ca-certificates cmake curl git build-essential pkg-config musl-tools binutils
              rm -rf /var/lib/apt/lists/*
              curl --proto "=https" --tlsv1.2 -sSf https://sh.rustup.rs \
                | sh -s -- -y --default-toolchain "${RUST_TOOLCHAIN}" \
                  --profile minimal --target "${REPRO_TARGET}"
              . "${HOME}/.cargo/env"
              REPRO_TARGET_DIR=target/reproducible-linux \
                REPRO_OUTPUT_DIR=dist/linux-static-binaries \
                scripts/build_reproducible_release.sh
              chown -R "${HOST_UID}:${HOST_GID}" dist/linux-static-binaries target/reproducible-linux
            '

      - name: Upload Linux binaries
        uses: actions/upload-artifact@v7
        with:
          name: linux-static-binaries
          path: dist/linux-static-binaries/lewm-*

  build-macos-arm:
    name: build-macos-arm
    runs-on: macos-14
    needs: [tag-format]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        run: rustup toolchain install "$RUST_TOOLCHAIN" --profile default --target aarch64-apple-darwin

      - name: Build release binaries
        run: REPRO_TARGET=aarch64-apple-darwin REPRO_TARGET_DIR=target/reproducible-macos-arm REPRO_OUTPUT_DIR=dist/macos-arm-binaries scripts/build_reproducible_release.sh

      - name: Upload macOS binaries
        uses: actions/upload-artifact@v7
        with:
          name: macos-arm-binaries
          path: dist/macos-arm-binaries/lewm-*

  container:
    name: container
    runs-on: ubuntu-22.04
    needs: [tag-format]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Log in to GHCR when Dockerfile exists
        if: hashFiles('Dockerfile') != ''
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push container when Dockerfile exists
        id: container_image
        run: |
          image='ghcr.io/abdelstark/lewm-rs'
          if [ -f Dockerfile ]; then
            build_date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            docker build \
              --build-arg "BUILD_REVISION=${GITHUB_SHA}" \
              --build-arg "BUILD_DATE=${build_date}" \
              --build-arg "SOURCE_VERSION=${GITHUB_REF_NAME}" \
              -t "${image}:${GITHUB_REF_NAME}" \
              -t "${image}:latest" \
              .
            docker push "${image}:${GITHUB_REF_NAME}"
            docker push "${image}:latest"
            digest="$(docker inspect --format '{{ index .RepoDigests 0 }}' "${image}:${GITHUB_REF_NAME}" | cut -d'@' -f2)"
            printf 'image=%s\n' "${image}" >> "${GITHUB_OUTPUT}"
            printf 'digest=%s\n' "${digest}" >> "${GITHUB_OUTPUT}"
            printf 'image_ref=%s@%s\n' "${image}" "${digest}" >> "${GITHUB_OUTPUT}"
          else
            printf '%s\n' 'container build skipped: Dockerfile not present'
          fi

      - name: Install cosign
        if: steps.container_image.outputs.image != ''
        uses: sigstore/cosign-installer@v3

      - name: Sign container image
        if: steps.container_image.outputs.image != ''
        run: |
          cosign sign --yes "${{ steps.container_image.outputs.image_ref }}"

      - name: Attest container provenance
        if: steps.container_image.outputs.image != ''
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ steps.container_image.outputs.image }}
          subject-digest: ${{ steps.container_image.outputs.digest }}
          push-to-registry: true

  release-notes:
    name: release-notes
    runs-on: ubuntu-22.04
    needs: [tag-format]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare release notes
        run: |
          mkdir -p dist
          awk '/^## \[/ { seen++ } seen <= 2 { print }' CHANGELOG.md > dist/release-notes.md

      - name: Upload release notes
        uses: actions/upload-artifact@v7
        with:
          name: release-notes
          path: dist/release-notes.md

  sbom:
    name: sbom
    runs-on: ubuntu-22.04
    needs: [tag-format]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Generate CycloneDX SBOM
        run: |
          SOURCE_DATE_EPOCH="$(git log -1 --format=%ct)" \
            python3 scripts/sbom.py --output dist/sbom.cdx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: dist/sbom.cdx.json

  verify-reproducible:
    name: verify-reproducible
    runs-on: ubuntu-22.04
    needs: [tag-format, build-linux-static]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download published Linux binaries
        uses: actions/download-artifact@v8
        with:
          name: linux-static-binaries
          path: dist/published

      - name: Rebuild and compare Linux binaries in a clean container
        run: |
          docker run --rm \
            -e RUST_TOOLCHAIN="${RUST_TOOLCHAIN}" \
            -e REPRO_PROFILE="${REPRO_PROFILE}" \
            -e REPRO_TARGET="${REPRO_TARGET}" \
            -e SOURCE_DATE_EPOCH="$(git log -1 --format=%ct)" \
            -v "${GITHUB_WORKSPACE}:/workspace" \
            -w /workspace \
            ubuntu:22.04 bash -lc '
              set -euo pipefail
              git config --global --add safe.directory /workspace
              apt-get update
              apt-get install -y --no-install-recommends \
                ca-certificates cmake curl git build-essential pkg-config musl-tools binutils
              rm -rf /var/lib/apt/lists/*
              curl --proto "=https" --tlsv1.2 -sSf https://sh.rustup.rs \
                | sh -s -- -y --default-toolchain "${RUST_TOOLCHAIN}" \
                  --profile minimal --target "${REPRO_TARGET}"
              . "${HOME}/.cargo/env"
              REPRO_TARGET_DIR=target/reproducible-linux \
                scripts/verify_reproducible_release.sh dist/published
            '

  infer-export-verifier:
    name: infer-export-verifier
    runs-on: ubuntu-22.04
    needs: [tag-format]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        run: rustup toolchain install "$RUST_TOOLCHAIN" --profile default

      - name: Run export verifier smoke
        run: cargo test -p lewm-infer --locked export_verifier_release_smoke

  attestation:
    name: attestation
    runs-on: ubuntu-22.04
    needs: [build-linux-static, build-macos-arm, sbom]
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Download Linux binaries
        uses: actions/download-artifact@v8
        with:
          name: linux-static-binaries
          path: dist/linux-static-binaries
      - name: Download macOS binaries
        uses: actions/download-artifact@v8
        with:
          name: macos-arm-binaries
          path: dist/macos-arm-binaries
      - name: Download SBOM
        uses: actions/download-artifact@v8
        with:
          name: sbom
          path: dist/sbom

      - name: Attest binary provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            dist/linux-static-binaries/lewm-*
            dist/macos-arm-binaries/lewm-*

      - name: Attest SBOM
        uses: actions/attest-sbom@v4
        with:
          subject-path: |
            dist/linux-static-binaries/lewm-*
            dist/macos-arm-binaries/lewm-*
          sbom-path: dist/sbom/sbom.cdx.json

  github-release:
    name: github-release
    runs-on: ubuntu-22.04
    needs: [build-linux-static, build-macos-arm, container, release-notes, sbom, verify-reproducible, infer-export-verifier, attestation]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download release artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist

      - name: Create draft release
        run: |
          gh release create "$GITHUB_REF_NAME" \
            dist/linux-static-binaries/* \
            dist/macos-arm-binaries/* \
            dist/sbom/sbom.cdx.json \
            --draft \
            --notes-file dist/release-notes/release-notes.md \
            --title "$GITHUB_REF_NAME"
        env:
          GH_TOKEN: ${{ github.token }}

  hub-models:
    name: hub-models
    runs-on: ubuntu-22.04
    needs: [github-release]
    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
    steps:
      - name: Retag Hub artifacts when credentials exist
        run: |
          if [ -n "${HF_TOKEN:-}" ]; then
            printf '%s\n' 'Hub retagging is owned by the Hub publication milestone.'
          else
            printf '%s\n' 'Hub retagging skipped: HF_TOKEN not configured'
          fi
