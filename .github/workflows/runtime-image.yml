name: runtime-image

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Concrete GHCR tag to publish, for example f1-runtime-<git-sha>"
        required: true
        type: string

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

concurrency:
  group: runtime-image-${{ inputs.image_tag }}
  cancel-in-progress: false

jobs:
  publish:
    name: publish
    runs-on: ubuntu-22.04
    env:
      IMAGE_TAG: ${{ inputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate image tag
        run: |
          set -euo pipefail
          if [[ "${IMAGE_TAG}" == latest ]]; then
            printf '%s\n' 'runtime image tag must not be latest' >&2
            exit 1
          fi
          if [[ "${IMAGE_TAG}" == *REPLACE_WITH_* ]]; then
            printf '%s\n' 'runtime image tag must not be a placeholder' >&2
            exit 1
          fi
          if [[ ! "${IMAGE_TAG}" =~ ^[A-Za-z0-9][A-Za-z0-9._-]{0,127}$ ]]; then
            printf 'invalid runtime image tag: %s\n' "${IMAGE_TAG}" >&2
            exit 1
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push runtime image
        id: runtime_image
        run: |
          set -euo pipefail
          image='ghcr.io/abdelstark/lewm-rs'
          image_ref="${image}:${IMAGE_TAG}"
          build_date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          docker build \
            --build-arg "BUILD_REVISION=${GITHUB_SHA}" \
            --build-arg "BUILD_DATE=${build_date}" \
            --build-arg "SOURCE_VERSION=${IMAGE_TAG}" \
            -t "${image_ref}" \
            .
          docker push "${image_ref}"
          digest="$(docker inspect --format '{{ index .RepoDigests 0 }}' "${image_ref}" | cut -d'@' -f2)"
          printf 'image=%s\n' "${image}" >> "${GITHUB_OUTPUT}"
          printf 'digest=%s\n' "${digest}" >> "${GITHUB_OUTPUT}"
          printf 'image_ref=%s@%s\n' "${image}" "${digest}" >> "${GITHUB_OUTPUT}"

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign runtime image
        run: |
          cosign sign --yes "${{ steps.runtime_image.outputs.image_ref }}"

      - name: Attest runtime image provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ steps.runtime_image.outputs.image }}
          subject-digest: ${{ steps.runtime_image.outputs.digest }}
          push-to-registry: true
