name: ci

on:
  pull_request:
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "Makefile"
      - "crates/**"
      - "scripts/check_layers.py"
      - ".github/workflows/ci.yml"
  push:
    branches: ["main"]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "Makefile"
      - "crates/**"
      - "scripts/check_layers.py"
      - ".github/workflows/ci.yml"

permissions:
  contents: read

jobs:
  layers:
    name: validate crate layers
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Run layer check
        run: python3 scripts/check_layers.py
