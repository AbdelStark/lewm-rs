name: ci

on:
  pull_request:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

# Cancel superseded runs on the same ref. Main-branch runs and tags are kept
# (they gate releases), but PR pushes supersede each other to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always
  RUST_TOOLCHAIN: "1.89.0"
  # Fail fast when the network goes down mid-run.
  CARGO_NET_RETRY: "3"
  RUSTUP_MAX_RETRIES: "3"

jobs:
  fmt:
    name: fmt
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        run: rustup toolchain install "$RUST_TOOLCHAIN" --profile default --component rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: clippy (${{ matrix.feature_set }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            feature_set: default
            feature_args: ""
          - os: ubuntu-22.04
            feature_set: cpu-only
            feature_args: "--no-default-features --features cpu-only"
          - os: ubuntu-22.04
            feature_set: parity-fixtures
            feature_args: "--features parity-fixtures"
          - os: macos-14
            feature_set: cpu-only
            feature_args: "--no-default-features --features cpu-only"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        run: rustup toolchain install "$RUST_TOOLCHAIN" --profile default --component clippy

      - name: Run clippy
        run: cargo clippy --workspace --all-targets ${{ matrix.feature_args }} -- -D warnings

  build:
    name: build (${{ matrix.feature_set }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            feature_set: default
            feature_args: ""
          - os: ubuntu-22.04
            feature_set: cpu-only
            feature_args: "--no-default-features --features cpu-only"
          - os: ubuntu-22.04
            feature_set: parity-fixtures
            feature_args: "--features parity-fixtures"
          - os: macos-14
            feature_set: cpu-only
            feature_args: "--no-default-features --features cpu-only"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        run: rustup toolchain install "$RUST_TOOLCHAIN" --profile default

      - name: Build workspace
        run: cargo build --workspace --locked ${{ matrix.feature_args }}

  test:
    name: test (${{ matrix.feature_set }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            feature_set: default
            feature_args: ""
          - os: ubuntu-22.04
            feature_set: cpu-only
            feature_args: "--no-default-features --features cpu-only"
          - os: ubuntu-22.04
            feature_set: parity-fixtures
            feature_args: "--features parity-fixtures"
          - os: macos-14
            feature_set: cpu-only
            feature_args: "--no-default-features --features cpu-only"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install Rust
        run: rustup toolchain install "$RUST_TOOLCHAIN" --profile default

      - name: Run tests
        run: cargo test --workspace --locked ${{ matrix.feature_args }} -- --skip "_slow_"

  parity:
    name: parity
    runs-on: ubuntu-22.04
    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      PARITY_DUMPS_DIR: /tmp/lewm-parity-dumps
      REFERENCE_SF_PATH: /tmp/lewm-parity-dumps/reference_model.safetensors
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install Rust
        run: rustup toolchain install "$RUST_TOOLCHAIN" --profile default

      - name: Restore parity dump cache
        id: cache-parity
        uses: actions/cache@v4
        with:
          path: /tmp/lewm-parity-dumps
          key: parity-dumps-${{ hashFiles('tests/fixtures/parity_fixture.npz') }}

      - name: Download parity dumps from HF
        if: steps.cache-parity.outputs.cache-hit != 'true' && env.HF_TOKEN != ''
        run: |
          set -euo pipefail
          pip install --quiet "huggingface_hub>=0.23"
          python3 - <<'PY'
          from huggingface_hub import snapshot_download
          snapshot_download(
              repo_id="AbdelStark/lewm-rs-parity-dumps",
              repo_type="dataset",
              local_dir="/tmp/lewm-parity-dumps",
          )
          PY

      - name: Run parity tests (numerical when dumps present, shape-only otherwise)
        run: |
          set -euo pipefail
          if [ -f "${PARITY_DUMPS_DIR}/encoder/cls.safetensors" ] && \
             [ -f "${REFERENCE_SF_PATH}" ]; then
            printf '%s\n' "parity dumps present — running full numerical tests"
            LEWM_PARITY_DUMPS="${PARITY_DUMPS_DIR}" \
            LEWM_REFERENCE_SAFETENSORS="${REFERENCE_SF_PATH}" \
            cargo test --workspace --locked --features parity-fixtures parity_ -- --skip "_slow_"
          else
            printf '%s\n' "parity dumps absent (HF_TOKEN required) — running shape-only parity filter"
            cargo test --workspace --locked --features parity-fixtures parity_ -- --skip "_slow_"
          fi

  deny:
    name: deny
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny

      - name: Run cargo-deny
        run: cargo deny check

  audit:
    name: audit
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      - name: Run cargo-audit
        # hdf5-metno depends on paste; cargo-deny still blocks direct workspace unmaintained deps.
        # Tract 0.22.1 pins the vulnerable time dependency; keep the audit ignore scoped until tract can upgrade.
        # Burn 0.20.1 pulls bincode 2.0.1; ADR 0002 tracks the date-bounded waiver.
        run: cargo audit --deny warnings --ignore RUSTSEC-2024-0436 --ignore RUSTSEC-2026-0009 --ignore RUSTSEC-2025-0141

  secrets:
    name: secrets
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Run wrapper self-test
        run: python3 scripts/check_secrets.py --self-test

      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: "8.30.1"
        run: |
          set -euo pipefail
          case "$(uname -m)" in
            x86_64) asset_arch="x64" ;;
            aarch64|arm64) asset_arch="arm64" ;;
            *) printf 'unsupported runner architecture: %s\n' "$(uname -m)" >&2; exit 1 ;;
          esac
          asset="gitleaks_${GITLEAKS_VERSION}_linux_${asset_arch}.tar.gz"
          base_url="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}"
          curl -sSfL "${base_url}/gitleaks_${GITLEAKS_VERSION}_checksums.txt" -o /tmp/gitleaks_checksums.txt
          curl -sSfL "${base_url}/${asset}" -o "/tmp/${asset}"
          (cd /tmp && grep "  ${asset}$" gitleaks_checksums.txt | sha256sum -c -)
          tar -xzf "/tmp/${asset}" -C /tmp gitleaks
          mkdir -p "${HOME}/.local/bin"
          install -m 0755 /tmp/gitleaks "${HOME}/.local/bin/gitleaks"
          echo "${HOME}/.local/bin" >> "${GITHUB_PATH}"

      - name: Run secret scan
        run: python3 scripts/check_secrets.py

  layers:
    name: layers
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Run layer check
        run: python3 scripts/check_layers.py

  specs:
    name: specs
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Run spec checks
        run: python3 scripts/check_specs.py

  jobs-schema:
    name: jobs-schema
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Run HF Jobs schema checks
        run: python3 scripts/check_jobs.py

  train-so100-job-schema:
    name: train-so100-job-schema
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Run train SO-100 job schema check
        run: python3 scripts/check_train_so100_job.py

  cost-ledger:
    name: cost-ledger
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Compile cost tooling
        run: python3 -m py_compile python/hf_pricing.py python/cost_ledger.py

      - name: Check cost ledger cap
        run: python3 python/cost_ledger.py check --path reports/cost.md --cap-usd 200

  determinism:
    name: determinism
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Run nondeterminism lint
        run: python3 scripts/check_nondet.py

  docs-build:
    name: docs-build
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        run: rustup toolchain install "$RUST_TOOLCHAIN" --profile default

      - name: Build rustdoc
        run: RUSTDOCFLAGS="-D warnings" cargo doc --workspace --no-deps --locked

  python-edge:
    name: python-edge
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Run Python edge tests when present
        run: |
          if [ -f python/pyproject.toml ]; then
            python3 -m pip install uv
            cd python
            uv run pytest
          else
            printf '%s\n' 'python edge tests skipped: python/pyproject.toml not present'
          fi

  quickstart:
    name: quickstart
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install Rust
        run: rustup toolchain install "$RUST_TOOLCHAIN" --profile default

      - name: Run quickstart smoke
        run: timeout 900 make test

  coverage:
    name: coverage
    runs-on: ubuntu-22.04
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install Rust
        run: rustup toolchain install "$RUST_TOOLCHAIN" --profile default

      - name: Install cargo-tarpaulin
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-tarpaulin

      - name: Generate coverage
        run: cargo tarpaulin --workspace --out Xml
