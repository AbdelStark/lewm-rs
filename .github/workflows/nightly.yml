name: nightly

on:
  pull_request:
    paths:
      - ".github/workflows/nightly.yml"
      - "Cargo.lock"
      - "Cargo.toml"
      - "bench-baselines/**"
      - "crates/**"
      - "scripts/bench_to_report.py"
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

env:
  RUST_TOOLCHAIN: "1.85.0"

jobs:
  slow-tests:
    name: slow-tests
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        run: rustup toolchain install "$RUST_TOOLCHAIN" --profile default

      - name: Run slow tests
        run: cargo test --workspace --features slow-tests -- --include-ignored

  feature-powerset:
    name: feature-powerset
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        run: rustup toolchain install "$RUST_TOOLCHAIN" --profile default

      - name: Install cargo-hack
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-hack

      - name: Check feature powerset
        run: cargo hack check --feature-powerset --workspace

  bench-baselines:
    name: bench-baselines
    runs-on: ${{ github.event_name == 'pull_request' && 'ubuntu-22.04' || 'ubuntu-22.04-gpu-l4' }}
    env:
      BENCH_SAVE_BASELINE: ${{ github.event_name == 'pull_request' && 'pr' || 'nightly' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        run: rustup toolchain install "$RUST_TOOLCHAIN" --profile default

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Run benchmarks
        run: cargo bench -p lewm-core --bench tensor_ops -- --save-baseline "$BENCH_SAVE_BASELINE"

      - name: Compare benchmarks (TST-0014-BENCH-REG-001)
        id: bench_compare
        run: |
          set +e
          python3 scripts/bench_to_report.py \
            --baseline-file bench-baselines/baselines.json \
            --criterion-dir target/criterion \
            --report reports/bench-regression.md \
            --comment-file reports/bench-comment.md \
            --default-grace-start-date "${{ github.event_name == 'pull_request' && github.event.pull_request.created_at || '' }}" \
            --github-output "$GITHUB_OUTPUT"
          status="$?"
          echo "exit_code=${status}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload benchmark report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-regression-report
          path: reports/bench-regression.md

      - name: Comment on PR regression
        if: github.event_name == 'pull_request' && steps.bench_compare.outputs.has_regressions == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr comment "${{ github.event.pull_request.number }}" --body-file reports/bench-comment.md

      - name: Enforce benchmark gate
        if: steps.bench_compare.outputs.exit_code != '0'
        run: exit 1

  dep-update-preview:
    name: dep-update-preview
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        run: rustup toolchain install "$RUST_TOOLCHAIN" --profile default

      - name: Preview dependency updates
        run: cargo update --workspace --dry-run

  parity-against-latest-hub:
    name: parity-against-latest-hub
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-22.04
    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        run: rustup toolchain install "$RUST_TOOLCHAIN" --profile default

      - name: Run latest-Hub parity when credentials exist
        run: |
          if [ -n "${HF_TOKEN:-}" ]; then
            cargo test --workspace --features parity-fixtures parity_ -- --skip "_slow_"
          else
            printf '%s\n' 'latest-Hub parity skipped: HF_TOKEN not configured'
          fi
