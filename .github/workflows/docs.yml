name: docs

on:
  push:
    branches: ["main"]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/**"
      - "docs/**"
      - "paper/**"
      - "specs/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read

env:
  RUST_TOOLCHAIN: "1.95.0"
  MDBOOK_VERSION: "0.4.52"

jobs:
  rustdoc-build:
    name: rustdoc-build
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        run: rustup toolchain install "$RUST_TOOLCHAIN" --profile default

      - name: Build rustdoc
        run: RUSTDOCFLAGS="-D warnings" cargo doc --workspace --no-deps --locked

  paper-build:
    name: paper-build
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pandoc
        run: sudo apt-get install -y --no-install-recommends pandoc

      - name: Render paper when present
        run: |
          if [ -f paper/lewm-rs.md ]; then
            pandoc paper/lewm-rs.md -o paper/lewm-rs.html --standalone
          else
            printf '%s\n' 'paper build skipped: paper/lewm-rs.md not present'
          fi

  spec-build:
    name: spec-build
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Validate specs before publishing
        run: python3 scripts/check_specs.py

  mdbook-build:
    name: mdbook-build
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        run: rustup toolchain install "$RUST_TOOLCHAIN" --profile default

      - name: Install mdBook
        run: |
          cargo install mdbook --version "=$MDBOOK_VERSION" --locked

      - name: Build the documentation site
        working-directory: docs
        run: mdbook build

      - name: Validate code blocks compile
        working-directory: docs
        run: mdbook test

      - name: Upload site artifact
        uses: actions/upload-artifact@v7
        with:
          name: lewm-rs-docs-site
          path: docs/book
          if-no-files-found: error
          retention-days: 30
